{% extends 'base.html' %}
{% block title %}{{ stage.title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-12 col-lg-10 col-xl-9">

  <!-- Header -->
  <div class="d-flex align-items-center gap-3 mb-4">
    <a href="{{ url_for('siswa.dashboard') }}" class="btn btn-outline-secondary btn-sm shadow-sm">✕</a>
    <div class="flex-grow-1">
      <div class="progress" style="height:12px; border-radius: 6px;">
        <div class="progress-bar bg-success" id="progressBar" style="width:0%;transition:width .4s"></div>
      </div>
    </div>
    <span class="text-muted fw-bold" id="progressLabel">0 / {{ total }}</span>
  </div>

  <!-- Card Soal -->
  <div class="card shadow-lg mb-4" id="questionCard" style="border-radius:20px; overflow:hidden;">
    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center border-bottom">
      <span id="qLabel" class="fw-bold text-muted">Soal 1 dari {{ total }}</span>
      <span id="qBadge" class="badge bg-primary px-3 py-2">PG</span>
    </div>
    <div class="card-body p-4 p-md-5">

      <!-- Gambar soal -->
      <div id="qMedia" class="mb-4 text-center" style="display:none">
        <img id="qImg" src="" class="img-fluid rounded shadow-sm" style="max-height:450px; width: auto; object-fit: contain;">
      </div>

      <!-- Teks soal -->
      <div class="question-content mb-4">
        <p class="fs-4 fw-bold" id="qText"></p>
      </div>

      <!-- Opsi PG -->
      <div id="pgOptions" class="row g-3"></div>

      <!-- Input Isian -->
      <div id="isianInput" style="display:none" class="col-12 col-lg-8 mx-auto">
        <input type="text" class="form-control form-control-lg py-3" id="isianAnswer"
               placeholder="Tulis jawaban kamu..." autocomplete="off">
      </div>
    </div>
  </div>

  <!-- Panel Feedback (muncul setelah periksa) -->
  <div id="feedbackPanel" class="card mt-3 shadow-sm" style="display:none; border-radius:12px;">
    <div class="card-body">
      <div class="d-flex align-items-center gap-2 mb-2">
        <span id="feedbackIcon" style="font-size:1.5rem"></span>
        <strong id="feedbackTitle" class="fs-5"></strong>
      </div>
      <p id="feedbackCorrect" class="mb-1 text-muted small"></p>
      <p id="feedbackExplanation" class="mb-0"></p>
    </div>
  </div>

  <!-- Tombol Aksi -->
  <div class="mt-4 d-grid gap-2">
    <button class="btn btn-lg btn-secondary shadow-sm" id="btnCheck" disabled onclick="checkAnswer()">
      Periksa
    </button>
    <button class="btn btn-lg btn-primary mt-2 shadow-sm" id="btnNext" style="display:none" onclick="nextQuestion()">
      Lanjut →
    </button>
  </div>

</div>
</div>

<script>
const QUESTIONS = {{ questions_json | safe }};
const SUBMIT_URL = "{{ url_for('siswa.stage_submit', stage_id=stage.id) }}";
const CHECK_URL  = "{{ url_for('siswa.check_answer', stage_id=stage.id) }}";

let current = 0;
let answers  = {};
let checked  = false;
let questionStartTime = Date.now();  // catat waktu mulai tiap soal

function loadQuestion(idx) {
  const q = QUESTIONS[idx];
  checked = false;
  questionStartTime = Date.now();  // reset timer tiap soal baru

  // Progress bar
  document.getElementById('progressBar').style.width = (idx / QUESTIONS.length * 100) + '%';
  document.getElementById('progressLabel').textContent = idx + ' / ' + QUESTIONS.length;
  document.getElementById('qLabel').textContent = 'Soal ' + (idx+1) + ' dari ' + QUESTIONS.length;
  document.getElementById('qBadge').textContent = q.type;
  document.getElementById('qBadge').className = 'badge px-3 py-2 ' + (q.type === 'PG' ? 'bg-primary' : 'bg-warning text-dark');
  document.getElementById('qText').textContent = q.content_text;

  // Media
  const mediaDiv = document.getElementById('qMedia');
  if (q.media_url) {
    document.getElementById('qImg').src = q.media_url;
    mediaDiv.style.display = '';
  } else {
    mediaDiv.style.display = 'none';
  }

  // Reset feedback & tombol
  document.getElementById('feedbackPanel').style.display = 'none';
  document.getElementById('btnCheck').style.display = '';
  document.getElementById('btnCheck').disabled = true;
  document.getElementById('btnCheck').className = 'btn btn-lg btn-secondary shadow-sm';
  document.getElementById('btnNext').style.display = 'none';

  if (q.type === 'PG') {
    document.getElementById('isianInput').style.display = 'none';
    // Clear dulu sebelum tampil, hindari flash opsi lama
    const pgDiv = document.getElementById('pgOptions');
    pgDiv.innerHTML = '';
    pgDiv.style.display = '';
    renderOptions(q);
  } else {
    document.getElementById('pgOptions').innerHTML = '';
    document.getElementById('pgOptions').style.display = 'none';
    document.getElementById('isianInput').style.display = '';
    const inp = document.getElementById('isianAnswer');
    inp.value = '';
    inp.disabled = false;
    inp.oninput = () => {
      document.getElementById('btnCheck').disabled = inp.value.trim() === '';
    };
  }
}

function renderOptions(q) {
  const container = document.getElementById('pgOptions');
  container.innerHTML = '';
  q.answers.forEach(ans => {
    const col = document.createElement('div');
    col.className = 'col-12 col-md-6';
    
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn btn-outline-secondary text-start p-3 w-100 h-100 option-btn';
    btn.dataset.id = ans.id;
    
    const span = document.createElement('span');
    span.className = 'fs-5';
    span.textContent = ans.text;
    
    btn.appendChild(span);
    btn.onclick = () => selectOption(btn, q);
    col.appendChild(btn);
    container.appendChild(col);
  });
}

function selectOption(btn, q) {
  if (checked) return;
  document.querySelectorAll('.option-btn').forEach(b => {
    b.classList.remove('btn-primary', 'active-option');
    b.classList.add('btn-outline-secondary');
  });
  btn.classList.remove('btn-outline-secondary');
  btn.classList.add('btn-primary', 'active-option');
  document.getElementById('btnCheck').disabled = false;
}

async function checkAnswer() {
  if (checked) return;
  checked = true;

  const q = QUESTIONS[current];
  let userAnswer = '';

  if (q.type === 'PG') {
    const sel = document.querySelector('.active-option');
    if (!sel) return;
    userAnswer = sel.dataset.id;
  } else {
    userAnswer = document.getElementById('isianAnswer').value.trim();
    document.getElementById('isianAnswer').disabled = true;
  }

  answers[q.id] = userAnswer;

  const timeTaken = (Date.now() - questionStartTime) / 1000;  // konversi ke detik

  // Kirim ke server untuk diperiksa
  const res = await fetch(CHECK_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({question_id: q.id, answer: userAnswer, time_taken: timeTaken})
  });
  const data = await res.json();

  showFeedback(data, q, userAnswer);
}

function showFeedback(data, q, userAnswer) {
  const panel = document.getElementById('feedbackPanel');
  panel.style.display = '';

  const isCorrect = data.is_correct;
  panel.className = 'card mt-3 shadow-sm border-' + (isCorrect ? 'success' : 'danger');
  panel.querySelector('.card-body').className = 'card-body bg-' + (isCorrect ? 'success' : 'danger') + ' bg-opacity-10';

  document.getElementById('feedbackIcon').textContent = isCorrect ? '✅' : '❌';
  document.getElementById('feedbackTitle').textContent = isCorrect ? 'Benar!' : 'Kurang tepat';
  document.getElementById('feedbackTitle').className = 'fs-5 text-' + (isCorrect ? 'success' : 'danger');

  document.getElementById('feedbackCorrect').textContent =
    isCorrect ? '' : 'Jawaban benar: ' + data.correct_text;
  document.getElementById('feedbackExplanation').textContent =
    data.explanation ? '💡 ' + data.explanation : '';

  // Warnai opsi PG
  if (q.type === 'PG') {
    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.disabled = true;
      const correctAns = q.answers.find(a => a.is_correct === undefined
        ? false : String(a.id) === String(data.correct_id));
      // Tandai pilihan user
      if (btn.dataset.id === userAnswer) {
        btn.className = 'btn text-start p-3 option-btn ' + (isCorrect ? 'btn-success' : 'btn-danger');
      }
    });
  }

  // Ganti tombol
  document.getElementById('btnCheck').style.display = 'none';
  const btnNext = document.getElementById('btnNext');
  btnNext.style.display = '';
  const isLast = current === QUESTIONS.length - 1;
  btnNext.textContent = isLast ? 'Lihat Hasil 🏆' : 'Lanjut →';
  btnNext.className = 'btn btn-lg mt-2 ' + (isCorrect ? 'btn-success' : 'btn-primary');
}

async function nextQuestion() {
  current++;
  if (current < QUESTIONS.length) {
    loadQuestion(current);
  } else {
    // Submit semua jawaban ke server
    try {
      const res = await fetch(SUBMIT_URL, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({answers})
      });
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); }
      catch { console.error('Non-JSON response:', text); alert('Server error, cek console.'); return; }

      if (res.status === 401) { window.location.href = '/login'; return; }
      if (!res.ok) { alert('Error: ' + (data.error || res.status)); return; }
      if (data.redirect) { window.location.href = data.redirect; }
    } catch(e) {
      console.error('Submit error:', e);
      alert('Network error: ' + e.message);
    }
  }
}

// Init
loadQuestion(0);
</script>

<style>
.option-btn { border-radius: 12px; font-size: 1rem; transition: all .15s; }
.option-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,.1); }
#questionCard { border-radius: 16px; }
#feedbackPanel { border-radius: 12px; }
</style>
{% endblock %}
